version: 1
model: contract-centric-token-aware-sdd

context_policy:
  entrypoint: specs/manifest.yml
  default_read_order:
    - specs/manifest.yml
    - affected active contract under specs/contracts/**/contract.md
    - active or in-progress change spec only when directly related
    - context-pack.md for the active change if present
  never_read_by_default:
    - specs/archive/**
    - specs/changes/** with status consolidated
    - backend/**/__pycache__/**
    - frontend/**/._*

contracts:
  - id: AUTH.RBAC
    path: specs/contracts/auth-rbac/contract.md
    status: active
    owns:
      - backend/app/auth/**
      - backend/app/domain/roles.py
      - backend/app/api/auth.py
      - backend/app/api/v1/auth/**
      - backend/app/api/v1/users/**
      - backend/app/application/users/**
      - frontend/src/app/auth/**
      - frontend/src/app/core/auth/**
      - frontend/src/app/features/users/**
    related_changes:
      - CHG-001
      - CHG-010

  - id: DISPLAY.CONFIG_SESSION
