openapi: 3.1.0
info:
  title: Kiosk Screen API
  version: 0.1.0
  description: MVP API contract for kiosk display, content, ads, readiness, roles, and approved embedded domains.
servers:
  - url: /api
security:
  - sessionCookie: []
components:
  securitySchemes:
    sessionCookie:
      type: apiKey
      in: cookie
      name: kiosk_session
  schemas:
    Error:
      type: object
      required: [code, message]
      properties:
        code:
          type: string
        message:
          type: string
        details:
          type: object
          additionalProperties: true
    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 1
    User:
      type: object
      required: [id, email, displayName, roles]
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        displayName:
          type: string
        roles:
          type: array
          items:
            type: string
            enum: [display_viewer, event_operator, content_manager, advertising_manager, administrator]
    KioskConfiguration:
      type: object
      required: [id, name, topRegionRatio, bottomRegionRatio, defaultTopDurationSeconds, defaultAdDurationSeconds, configuredEventDurationMinutes, isEnabled]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        topRegionRatio:
          type: integer
          const: 4
        bottomRegionRatio:
          type: integer
          const: 1
        defaultTopDurationSeconds:
          type: integer
          minimum: 1
        defaultAdDurationSeconds:
          type: integer
          minimum: 1
        configuredEventDurationMinutes:
          type: integer
          minimum: 1
        isEnabled:
          type: boolean
    KioskConfigurationRequest:
      type: object
      required: [name, defaultTopDurationSeconds, defaultAdDurationSeconds, configuredEventDurationMinutes, isEnabled]
      properties:
        name:
          type: string
        defaultTopDurationSeconds:
          type: integer
          minimum: 1
        defaultAdDurationSeconds:
          type: integer
          minimum: 1
        configuredEventDurationMinutes:
          type: integer
          minimum: 1
        isEnabled:
          type: boolean
    ContentItem:
      type: object
      required: [id, title, contentType, sourceReference, isActive, displayOrder]
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
        contentType:
          type: string
          enum: [photo, video, embedded_web]
        sourceReference:
          type: string
        approvedDomainId:
          type: string
          format: uuid
          nullable: true
        isActive:
          type: boolean
        displayOrder:
          type: integer
          minimum: 1
        durationSeconds:
          type: integer
          minimum: 1
          nullable: true
        availableFrom:
          type: string
          format: date-time
          nullable: true
        availableUntil:
          type: string
          format: date-time
          nullable: true
    ContentItemRequest:
      type: object
      required: [title, contentType, sourceReference, isActive, displayOrder]
      properties:
        title:
          type: string
        contentType:
          type: string
          enum: [photo, video, embedded_web]
        sourceReference:
          type: string
        approvedDomainId:
          type: string
          format: uuid
          nullable: true
        isActive:
          type: boolean
        displayOrder:
          type: integer
          minimum: 1
        durationSeconds:
          type: integer
          minimum: 1
          nullable: true
        availableFrom:
          type: string
          format: date-time
          nullable: true
        availableUntil:
          type: string
          format: date-time
          nullable: true
    Client:
      type: object
      required: [id, name, isActive]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        isActive:
          type: boolean
    ClientRequest:
      type: object
      required: [name, isActive]
      properties:
        name:
          type: string
        isActive:
          type: boolean
    AdItem:
      type: object
      required: [id, sourceReference, isActive, displayOrder]
      properties:
        id:
          type: string
          format: uuid
        sourceReference:
          type: string
        isActive:
          type: boolean
        displayOrder:
          type: integer
          minimum: 1
        durationSeconds:
          type: integer
          minimum: 1
          nullable: true
        availableFrom:
          type: string
          format: date-time
          nullable: true
        availableUntil:
          type: string
          format: date-time
          nullable: true
        advertiser:
          type: string
          maxLength: 120
          nullable: true
    AdItemRequest:
      type: object
      required: [sourceReference, isActive, displayOrder]
      properties:
        sourceReference:
          type: string
        isActive:
          type: boolean
        displayOrder:
          type: integer
          minimum: 1
        durationSeconds:
          type: integer
          minimum: 1
          nullable: true
        availableFrom:
          type: string
          format: date-time
          nullable: true
        availableUntil:
          type: string
          format: date-time
          nullable: true
    ApprovedEmbeddedDomain:
      type: object
      required: [id, domain, isActive]
      properties:
        id:
          type: string
          format: uuid
        domain:
          type: string
        isActive:
          type: boolean
    ApprovedEmbeddedDomainRequest:
      type: object
      required: [domain, isActive]
      properties:
        domain:
          type: string
        isActive:
          type: boolean
    UserRequest:
      type: object
      required: [email, displayName, roles, isActive]
      properties:
        email:
          type: string
          format: email
        displayName:
          type: string
        roles:
          type: array
          items:
            type: string
            enum: [display_viewer, event_operator, content_manager, advertising_manager, administrator]
        isActive:
          type: boolean
    ReadinessReport:
      type: object
      required: [ready, blockers, warnings]
      properties:
        ready:
          type: boolean
        blockers:
          type: array
          items:
            type: string
        warnings:
          type: array
          items:
            type: string
    DisplayState:
      type: object
      required: [configuration, topContent, ads, fallbackActive]
      properties:
        configuration:
          $ref: '#/components/schemas/KioskConfiguration'
        topContent:
          type: array
          items:
            $ref: '#/components/schemas/ContentItem'
        ads:
          type: array
          items:
            $ref: '#/components/schemas/AdItem'
        fallbackActive:
          type: boolean
    DisplayEvent:
      type: object
      required: [id, eventType, severity, message, createdAt]
      properties:
        id:
          type: string
          format: uuid
        eventType:
          type: string
        severity:
          type: string
          enum: [info, warning, error]
        message:
          type: string
        createdAt:
          type: string
          format: date-time
paths:
  /auth/login:
    post:
      tags: [Authentication]
      summary: Start an authenticated session.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Authenticated user.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '401':
          description: Invalid credentials.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /auth/logout:
    post:
      tags: [Authentication]
      summary: End current session.
      responses:
        '204':
          description: Session ended.
  /auth/me:
    get:
      tags: [Authentication]
      summary: Read current authenticated user.
      responses:
        '200':
          description: Current user.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '401':
          description: Not authenticated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /display/configuration:
    get:
      tags: [Display]
      summary: Read kiosk display configuration.
      responses:
        '200':
          description: Kiosk configuration.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/KioskConfiguration'
    put:
      tags: [Display]
      summary: Update kiosk display configuration.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/KioskConfigurationRequest'
      responses:
        '200':
          description: Updated kiosk configuration.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/KioskConfiguration'
        '403':
          description: Administrator role required.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /display/open:
    post:
      tags: [Display]
      summary: Open the live kiosk display for the configured event duration.
      responses:
        '200':
          description: Initial display state.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DisplayState'
        '403':
          description: Event operator or administrator role required.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '409':
          description: Display is not ready.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /display/state:
    get:
      tags: [Display]
      summary: Read current eligible content and ads for kiosk display.
      responses:
        '200':
          description: Current display state.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DisplayState'
  /readiness:
    get:
      tags: [Readiness]
      summary: Read readiness report.
      responses:
        '200':
          description: Readiness report.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReadinessReport'
  /content:
    get:
      tags: [Top Content]
      summary: List top content items.
      responses:
        '200':
          description: Top content items.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ContentItem'
    post:
      tags: [Top Content]
      summary: Create a top content item.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ContentItemRequest'
      responses:
        '201':
          description: Created top content item.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ContentItem'
        '403':
          description: Content manager or administrator role required.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /content/{contentId}:
    parameters:
      - name: contentId
        in: path
        required: true
        schema:
          type: string
          format: uuid
    get:
      tags: [Top Content]
      summary: Read top content item.
      responses:
        '200':
          description: Top content item.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ContentItem'
    put:
      tags: [Top Content]
      summary: Update top content item.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ContentItemRequest'
      responses:
        '200':
          description: Updated top content item.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ContentItem'
    delete:
      tags: [Top Content]
      summary: Remove top content item.
      responses:
        '204':
          description: Removed.
  /ads:
    get:
      tags: [Ads]
      summary: List ad items.
      responses:
        '200':
          description: Ad items.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/AdItem'
    post:
      tags: [Ads]
      summary: Create ad item.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AdItemRequest'
      responses:
        '201':
          description: Created ad item.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdItem'
  /ads/{adId}:
    parameters:
      - name: adId
        in: path
        required: true
        schema:
          type: string
          format: uuid
    get:
      tags: [Ads]
      summary: Read ad item.
      responses:
        '200':
          description: Ad item.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdItem'
    put:
      tags: [Ads]
      summary: Update ad item.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AdItemRequest'
      responses:
        '200':
          description: Updated ad item.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdItem'
    delete:
      tags: [Ads]
      summary: Remove ad item.
      responses:
        '204':
          description: Removed.
  /approved-domains:
    get:
      tags: [Approved Domains]
      summary: List approved embedded domains.
      responses:
        '200':
          description: Approved embedded domains.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ApprovedEmbeddedDomain'
    post:
      tags: [Approved Domains]
      summary: Create approved embedded domain.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ApprovedEmbeddedDomainRequest'
      responses:
        '201':
          description: Created approved domain.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApprovedEmbeddedDomain'
  /approved-domains/{domainId}:
    parameters:
      - name: domainId
        in: path
        required: true
        schema:
          type: string
          format: uuid
    put:
      tags: [Approved Domains]
      summary: Update approved embedded domain.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ApprovedEmbeddedDomainRequest'
      responses:
        '200':
          description: Updated approved domain.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApprovedEmbeddedDomain'
    delete:
      tags: [Approved Domains]
      summary: Remove approved embedded domain when no active iframe content depends on it.
      responses:
        '204':
          description: Removed.
        '409':
          description: Active iframe content depends on this domain.
  /events:
    get:
      tags: [Events]
      summary: List recent display events.
      responses:
        '200':
          description: Display events.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/DisplayEvent'
  /users:
    get:
      tags: [Users]
      summary: List users and role assignments.
      responses:
        '200':
          description: Users.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/User'
    post:
      tags: [Users]
      summary: Create user with role assignments.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserRequest'
      responses:
        '201':
          description: Created user.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
  /users/{userId}:
    parameters:
      - name: userId
        in: path
        required: true
        schema:
          type: string
          format: uuid
    put:
      tags: [Users]
      summary: Update user and role assignments.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserRequest'
      responses:
        '200':
          description: Updated user.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
