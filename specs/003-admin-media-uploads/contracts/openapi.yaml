openapi: 3.1.0
info:
  title: Kiosk Screen API - Admin Media Uploads
  version: 0.2.0
  description: Contract additions for admin media uploads, protected media access, and rotation settings.
servers:
  - url: /api
security:
  - sessionCookie: []
components:
  securitySchemes:
    sessionCookie:
      type: apiKey
      in: cookie
      name: kiosk_session
  schemas:
    Error:
      type: object
      required: [code, message]
      properties:
        code:
          type: string
        message:
          type: string
        details:
          type: object
          additionalProperties: true
    RotationAnimation:
      type: string
      enum: [none, fade, slide]
    MediaFileReference:
      type: object
      required: [id, mediaType, contentType, fileSizeBytes, originalFilename, mediaUrl]
      properties:
        id:
          type: string
          format: uuid
        mediaType:
          type: string
          enum: [image, video]
        contentType:
          type: string
        fileSizeBytes:
          type: integer
          minimum: 1
        originalFilename:
          type: string
        mediaUrl:
          type: string
          description: Authenticated application URL for loading the uploaded media.
    ContentItem:
      type: object
      required: [id, title, contentType, sourceReference, isActive, displayOrder]
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
        contentType:
          type: string
          enum: [photo, video, embedded_web]
        sourceReference:
          type: string
        mediaFile:
          anyOf:
            - $ref: '#/components/schemas/MediaFileReference'
            - type: 'null'
        approvedDomainId:
          type: string
          format: uuid
          nullable: true
        isActive:
          type: boolean
        displayOrder:
          type: integer
          minimum: 1
        durationSeconds:
          type: integer
          minimum: 1
          nullable: true
        rotationAnimation:
          anyOf:
            - $ref: '#/components/schemas/RotationAnimation'
            - type: 'null'
        animationDurationMilliseconds:
          type: integer
          minimum: 1
          nullable: true
        effectiveDurationSeconds:
          type: integer
          minimum: 1
          nullable: true
        effectiveRotationAnimation:
          anyOf:
            - $ref: '#/components/schemas/RotationAnimation'
            - type: 'null'
        effectiveAnimationDurationMilliseconds:
          type: integer
          minimum: 1
          nullable: true
    AdItem:
      type: object
      required: [id, clientId, label, sourceReference, isActive, displayOrder]
      properties:
        id:
          type: string
          format: uuid
        clientId:
          type: string
          format: uuid
        label:
          type: string
        sourceReference:
          type: string
        mediaFile:
          anyOf:
            - $ref: '#/components/schemas/MediaFileReference'
            - type: 'null'
        isActive:
          type: boolean
        displayOrder:
          type: integer
          minimum: 1
        durationSeconds:
          type: integer
          minimum: 1
          nullable: true
        rotationAnimation:
          anyOf:
            - $ref: '#/components/schemas/RotationAnimation'
            - type: 'null'
        animationDurationMilliseconds:
          type: integer
          minimum: 1
          nullable: true
        effectiveDurationSeconds:
          type: integer
          minimum: 1
          nullable: true
        effectiveRotationAnimation:
          anyOf:
            - $ref: '#/components/schemas/RotationAnimation'
            - type: 'null'
        effectiveAnimationDurationMilliseconds:
          type: integer
          minimum: 1
          nullable: true
    IframeContentRequest:
      type: object
      required: [title, sourceReference, isActive, displayOrder]
      properties:
        title:
          type: string
        sourceReference:
          type: string
        approvedDomainId:
          type: string
          format: uuid
          nullable: true
        isActive:
          type: boolean
        displayOrder:
          type: integer
          minimum: 1
        durationSeconds:
          type: integer
          minimum: 1
          nullable: true
        rotationAnimation:
          anyOf:
            - $ref: '#/components/schemas/RotationAnimation'
            - type: 'null'
        animationDurationMilliseconds:
          type: integer
          minimum: 1
          nullable: true
    KioskConfiguration:
      type: object
      required:
        - id
        - name
        - defaultTopDurationSeconds
        - defaultAdDurationSeconds
        - defaultTopRotationAnimation
        - defaultAdRotationAnimation
        - defaultTopAnimationDurationMilliseconds
        - defaultAdAnimationDurationMilliseconds
        - inlineAdCount
        - configuredEventDurationMinutes
        - isEnabled
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        defaultTopDurationSeconds:
          type: integer
          minimum: 1
        defaultAdDurationSeconds:
          type: integer
          minimum: 1
        defaultTopRotationAnimation:
          $ref: '#/components/schemas/RotationAnimation'
        defaultAdRotationAnimation:
          $ref: '#/components/schemas/RotationAnimation'
        defaultTopAnimationDurationMilliseconds:
          type: integer
          minimum: 1
        defaultAdAnimationDurationMilliseconds:
          type: integer
          minimum: 1
        inlineAdCount:
          type: integer
          minimum: 1
        configuredEventDurationMinutes:
          type: integer
          minimum: 1
        isEnabled:
          type: boolean
    KioskConfigurationRequest:
      type: object
      required:
        - name
        - defaultTopDurationSeconds
        - defaultAdDurationSeconds
        - defaultTopRotationAnimation
        - defaultAdRotationAnimation
        - defaultTopAnimationDurationMilliseconds
        - defaultAdAnimationDurationMilliseconds
        - inlineAdCount
        - configuredEventDurationMinutes
        - isEnabled
      properties:
        name:
          type: string
        defaultTopDurationSeconds:
          type: integer
          minimum: 1
        defaultAdDurationSeconds:
          type: integer
          minimum: 1
        defaultTopRotationAnimation:
          $ref: '#/components/schemas/RotationAnimation'
        defaultAdRotationAnimation:
          $ref: '#/components/schemas/RotationAnimation'
        defaultTopAnimationDurationMilliseconds:
          type: integer
          minimum: 1
        defaultAdAnimationDurationMilliseconds:
          type: integer
          minimum: 1
        inlineAdCount:
          type: integer
          minimum: 1
        configuredEventDurationMinutes:
          type: integer
          minimum: 1
        isEnabled:
          type: boolean
paths:
  /content/upload:
    post:
      summary: Upload image or video main content
      security:
        - sessionCookie: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file, title, contentType, isActive, displayOrder]
              properties:
                file:
                  type: string
                  format: binary
                title:
                  type: string
                contentType:
                  type: string
                  enum: [photo, video]
                isActive:
                  type: boolean
                displayOrder:
                  type: integer
                  minimum: 1
                durationSeconds:
                  type: integer
                  minimum: 1
                rotationAnimation:
                  $ref: '#/components/schemas/RotationAnimation'
                animationDurationMilliseconds:
                  type: integer
                  minimum: 1
      responses:
        '201':
          description: Uploaded content created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ContentItem'
        '400':
          description: Invalid metadata, unsupported media type, or file size limit exceeded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: User lacks content upload permission
        '507':
          description: Storage unavailable or full
  /content/iframe:
    post:
      summary: Create iframe main content
      security:
        - sessionCookie: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/IframeContentRequest'
      responses:
        '201':
          description: Iframe content created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ContentItem'
        '400':
          description: Invalid iframe metadata or source
        '403':
          description: User lacks content creation permission
  /ads/upload:
    post:
      summary: Upload image ad
      security:
        - sessionCookie: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file, clientId, label, isActive, displayOrder]
              properties:
                file:
                  type: string
                  format: binary
                clientId:
                  type: string
                  format: uuid
                label:
                  type: string
                isActive:
                  type: boolean
                displayOrder:
                  type: integer
                  minimum: 1
                durationSeconds:
                  type: integer
                  minimum: 1
                rotationAnimation:
                  $ref: '#/components/schemas/RotationAnimation'
                animationDurationMilliseconds:
                  type: integer
                  minimum: 1
      responses:
        '201':
          description: Uploaded ad created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdItem'
        '400':
          description: Invalid metadata, unsupported media type, file size limit exceeded, or invalid client
        '403':
          description: User lacks ad upload permission
        '507':
          description: Storage unavailable or full
  /media/{mediaId}:
    get:
      summary: Load protected uploaded media
      security:
        - sessionCookie: []
      parameters:
        - name: mediaId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Media file stream
          content:
            image/*:
              schema:
                type: string
                format: binary
            video/*:
              schema:
                type: string
                format: binary
        '401':
          description: Authentication required
        '403':
          description: User or kiosk session cannot access this media
        '404':
          description: Media reference or file not found
  /display/configuration:
    put:
      summary: Update display configuration with rotation defaults
      security:
        - sessionCookie: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/KioskConfigurationRequest'
      responses:
        '200':
          description: Updated configuration
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/KioskConfiguration'
        '400':
          description: Invalid rotation, animation, or inline ad count settings
        '403':
          description: User lacks permission for requested configuration area
