apiVersion: apps/v1
kind: Deployment
metadata:
  name: kiosk-frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kiosk-frontend
  template:
    metadata:
      labels:
        app: kiosk-frontend
    spec:
      containers:
        - name: frontend
          image: docker.io/your-org/kiosk-frontend:latest
          ports:
            - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: kiosk-frontend
spec:
  selector:
    app: kiosk-frontend
  ports:
    - port: 80
      targetPort: 80
