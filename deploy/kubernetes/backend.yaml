apiVersion: v1
kind: Service
metadata:
  name: kiosk-backend
  namespace: kiosk-screen
  labels:
    app.kubernetes.io/name: kiosk-backend
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: kiosk-backend
  ports:
    - name: http
      port: 8000
      targetPort: 8000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kiosk-backend
  namespace: kiosk-screen
  labels:
    app.kubernetes.io/name: kiosk-backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: kiosk-backend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: kiosk-backend
    spec:
      automountServiceAccountToken: false
      enableServiceLinks: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        fsGroup: 10001
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: backend
          image: rromani/kiosk-backend:1.0.0
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          ports:
            - name: http
              containerPort: 8000
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: kiosk-secrets
                  key: DATABASE_URL
            - name: SESSION_SECRET
              valueFrom:
                secretKeyRef:
                  name: kiosk-secrets
                  key: SESSION_SECRET
            - name: BOOTSTRAP_ADMIN_EMAIL
              valueFrom:
                secretKeyRef:
                  name: kiosk-secrets
                  key: BOOTSTRAP_ADMIN_EMAIL
            - name: BOOTSTRAP_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: kiosk-secrets
                  key: BOOTSTRAP_ADMIN_PASSWORD
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: kiosk-secrets
                  key: REDIS_URL
            - name: FRONTEND_ORIGIN
              valueFrom:
                configMapKeyRef:
                  name: kiosk-config
                  key: FRONTEND_ORIGIN
            - name: MEDIA_STORAGE_PATH
              valueFrom:
                configMapKeyRef:
                  name: kiosk-config
                  key: MEDIA_STORAGE_PATH
            - name: IMAGE_UPLOAD_MAX_BYTES
              valueFrom:
                configMapKeyRef:
                  name: kiosk-config
                  key: IMAGE_UPLOAD_MAX_BYTES
            - name: VIDEO_UPLOAD_MAX_BYTES
              valueFrom:
                configMapKeyRef:
                  name: kiosk-config
                  key: VIDEO_UPLOAD_MAX_BYTES
            - name: ROTATION_ANIMATIONS
              valueFrom:
                configMapKeyRef:
                  name: kiosk-config
                  key: ROTATION_ANIMATIONS
            - name: PUBLIC_API_CORS_ORIGINS
              valueFrom:
                configMapKeyRef:
                  name: kiosk-config
                  key: PUBLIC_API_CORS_ORIGINS
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 20
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          volumeMounts:
            - name: media
              mountPath: /app/media
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: media
          persistentVolumeClaim:
            claimName: kiosk-backend-media
        - name: tmp
          emptyDir: {}
