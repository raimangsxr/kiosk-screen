server {
  listen 8080;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # Anonymous visitor lands on a locale-prefixed URL.
  # The negotiated locale prefix comes from the Accept-Language header
  # sent by the browser; anything starting with "en" goes to /en-US/, and
  # anything else (or absent) falls back to /es-ES/. The default matches
  # LocaleService.DEFAULT_LOCALE.
  location = / {
    set $locale_prefix "/es-ES/";
    if ($http_accept_language ~ "^en") {
      set $locale_prefix "/en-US/";
    }
    return 302 $locale_prefix;
  }

  # Spanish bundle served from /usr/share/nginx/html/es-ES/.
  location /es-ES/ {
    alias /usr/share/nginx/html/es-ES/;
    index index.html;
    try_files $uri $uri/ /es-ES/index.html;
  }

  location = /es-ES/manifest.webmanifest {
    default_type application/manifest+json;
    add_header Cache-Control "no-cache";
    alias /usr/share/nginx/html/es-ES/manifest.webmanifest;
    try_files $uri =404;
  }

  location = /es-ES/ngsw-worker.js {
    add_header Cache-Control "no-cache";
    alias /usr/share/nginx/html/es-ES/ngsw-worker.js;
    try_files $uri =404;
  }

  location = /es-ES/ngsw.json {
    add_header Cache-Control "no-cache";
    alias /usr/share/nginx/html/es-ES/ngsw.json;
    try_files $uri =404;
  }

  location = /es-ES/index.html {
    add_header Cache-Control "no-cache";
    alias /usr/share/nginx/html/es-ES/index.html;
    try_files $uri =404;
  }

  # English bundle served from /usr/share/nginx/html/en-US/.
  location /en-US/ {
    alias /usr/share/nginx/html/en-US/;
    index index.html;
    try_files $uri $uri/ /en-US/index.html;
  }

  location = /en-US/manifest.webmanifest {
    default_type application/manifest+json;
    add_header Cache-Control "no-cache";
    alias /usr/share/nginx/html/en-US/manifest.webmanifest;
    try_files $uri =404;
  }

  location = /en-US/ngsw-worker.js {
    add_header Cache-Control "no-cache";
    alias /usr/share/nginx/html/en-US/ngsw-worker.js;
    try_files $uri =404;
  }

  location = /en-US/ngsw.json {
    add_header Cache-Control "no-cache";
    alias /usr/share/nginx/html/en-US/ngsw.json;
    try_files $uri =404;
  }

  location = /en-US/index.html {
    add_header Cache-Control "no-cache";
    alias /usr/share/nginx/html/en-US/index.html;
    try_files $uri =404;
  }

  # Bare `/es-ES` or `/en-US` (no trailing slash) redirects to the prefixed
  # canonical URL so the bundle's <base href> resolves correctly.
  location = /es-ES {
    return 302 /es-ES/;
  }

  location = /en-US {
    return 302 /en-US/;
  }

  # Anything else (a path that does not start with a locale prefix) is
  # bounced to /es-ES/ so the operator lands on the default bundle.
  location / {
    return 302 /es-ES/;
  }

  location = /health {
    access_log off;
    default_type application/json;
    return 200 '{"status":"ok"}';
  }
}