name: Bump kiosk-screen images in argocd-apps

on:
  workflow_run:
    workflows: ["Release Images"]
    types: [completed]

permissions:
  contents: read
  actions: read

jobs:
  prepare:
    name: Read release tag
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.read.outputs.raw }}
    steps:
      - name: Download release tag artifact
        uses: actions/download-artifact@v4
        with:
          name: release-tag
          path: release-info
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ github.event.workflow_run.id }}

      - name: Read release tag
        id: read
        run: |
          RAW=$(cat release-info/tag.txt | tr -d '\n')
          echo "raw=${RAW}" >> "$GITHUB_OUTPUT"

  bump:
    name: Bump images in argocd-apps
    needs: prepare
    if: github.event.workflow_run.conclusion == 'success'
    uses: raimangsxr/argocd-apps/.github/workflows/argocd-bump.yml@0ba5290cc4bb4bb28ddecee0335b9e5ffa1d00d7 # pin to v2 commit; bump on new releases
    with:
      release_tag: ${{ needs.prepare.outputs.tag }}
      app_name: kiosk-screen