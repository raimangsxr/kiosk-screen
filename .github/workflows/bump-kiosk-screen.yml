name: Bump kiosk-screen images in argocd-apps

on:
  workflow_run:
    workflows: ["Release Images"]
    types: [completed]

permissions:
  contents: read
  actions: read

jobs:
  bump:
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Download release tag artifact
        uses: actions/download-artifact@v4
        with:
          name: release-tag
          path: release-info
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ github.event.workflow_run.id }}

      - name: Read release tag
        id: tag
        run: |
          RAW=$(cat release-info/tag.txt | tr -d '\n')
          echo "raw=${RAW}" >> "$GITHUB_OUTPUT"

      - name: Invoke reusable bump workflow
        uses: raimangsxr/argocd-apps/.github/workflows/argocd-bump.yml@v1
        with:
          release_tag: ${{ steps.tag.outputs.raw }}
          app_name: kiosk-screen
          argocd_apps_token: ${{ secrets.ARGOCD_APPS_TOKEN }}