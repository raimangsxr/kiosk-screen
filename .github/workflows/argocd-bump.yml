name: Bump argocd-apps images

on:
  workflow_run:
    workflows: ["Release Images"]
    types: [completed]

permissions:
  contents: read
  actions: read

jobs:
  open-bump-pr:
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Download release tag artifact
        uses: actions/download-artifact@v4
        with:
          name: release-tag
          path: release-info
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ github.event.workflow_run.id }}

      - name: Read and normalise release tag
        id: tag
        run: |
          RAW=$(cat release-info/tag.txt | tr -d '\n')
          VERSION="${RAW#v}"
          echo "raw=${RAW}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Release tag: ${RAW} (manifest version: ${VERSION})"

      - name: Check out argocd-apps
        uses: actions/checkout@v4
        with:
          repository: raimangsxr/argocd-apps
          token: ${{ secrets.ARGOCD_APPS_TOKEN }}
          path: argocd-apps

      - name: Detect hotfix
        id: hotfix
        working-directory: argocd-apps
        run: |
          NEW="${{ steps.tag.outputs.version }}"
          CUR=$(grep -oE 'kiosk-backend:[0-9]+(\.[0-9]+)*' manifests/kiosk-screen/backend.yaml | head -1 | cut -d: -f2)
          echo "current=${CUR}" >> "$GITHUB_OUTPUT"

          py_major() { echo "$1" | awk -F. '{print $1}'; }
          py_minor() { echo "$1" | awk -F. '{print $2}'; }
          NEW_MAJ=$(py_major "$NEW"); NEW_MIN=$(py_minor "$NEW")
          CUR_MAJ=$(py_major "$CUR"); CUR_MIN=$(py_minor "$CUR")

          if [[ -n "$NEW_MAJ" && -n "$NEW_MIN" \
                && "$NEW_MAJ" == "$CUR_MAJ" \
                && "$NEW_MIN" == "$CUR_MIN" \
                && "$NEW" != "$CUR" ]]; then
            echo "is_hotfix=true" >> "$GITHUB_OUTPUT"
            echo "HOTFIX: ${CUR} -> ${NEW} (same major.minor)"
          else
            echo "is_hotfix=false" >> "$GITHUB_OUTPUT"
            echo "NOT a hotfix: ${CUR} -> ${NEW} (requires manual review)"
          fi

      - name: Compute new image references
        id: img
        env:
          OWNER: ${{ secrets.DOCKERHUB_USERNAME }}
        run: |
          V=${{ steps.tag.outputs.version }}
          echo "backend=${OWNER}/kiosk-backend:${V}" >> "$GITHUB_OUTPUT"
          echo "frontend=${OWNER}/kiosk-frontend:${V}" >> "$GITHUB_OUTPUT"

      - name: Patch kiosk manifests
        env:
          BACKEND: ${{ steps.img.outputs.backend }}
          FRONTEND: ${{ steps.img.outputs.frontend }}
        working-directory: argocd-apps
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import os, pathlib, re
          BACKEND, FRONTEND = os.environ["BACKEND"], os.environ["FRONTEND"]
          root = pathlib.Path("manifests/kiosk-screen")
          targets = {
              root / "backend.yaml":       (r"(image:\s*).*kiosk-backend:.*",  f"image: {BACKEND}"),
              root / "frontend.yaml":      (r"(image:\s*).*kiosk-frontend:.*", f"image: {FRONTEND}"),
              root / "migration-job.yaml": (r"(image:\s*).*kiosk-backend:.*",  f"image: {BACKEND}"),
          }
          changed = []
          for f, (pat, repl) in targets.items():
              txt = f.read_text()
              new = re.sub(pat, repl, txt, count=1)
              if new == txt:
                  print(f"no change: {f}")
              else:
                  f.write_text(new)
                  changed.append(str(f))
          pathlib.Path("changed.txt").write_text("\n".join(changed))
          PY

      - name: Abort if no diff
        working-directory: argocd-apps
        run: |
          if [ -z "$(cat changed.txt)" ]; then
            echo "No image tag changes detected; skipping PR."
            exit 0
          fi

      - name: Configure git
        working-directory: argocd-apps
        run: |
          git config user.name  "kiosk-bump-bot"
          git config user.email "kiosk-bump-bot@users.noreply.github.com"

      - name: Create branch, commit, push
        working-directory: argocd-apps
        env:
          TOKEN: ${{ secrets.ARGOCD_APPS_TOKEN }}
          VERSION: ${{ steps.tag.outputs.version }}
        run: |
          BRANCH="bump-kiosk-${VERSION}"
          git checkout -b "${BRANCH}"
          git add manifests/kiosk-screen
          git commit -m "chore: bump kiosk-screen to ${VERSION}"
          git push "https://x-access-token:${TOKEN}@github.com/raimangsxr/argocd-apps.git" "${BRANCH}"

      - name: Open PR
        env:
          GH_TOKEN: ${{ secrets.ARGOCD_APPS_TOKEN }}
          VERSION: ${{ steps.tag.outputs.version }}
          RAW_TAG: ${{ steps.tag.outputs.raw }}
          IS_HOTFIX: ${{ steps.hotfix.outputs.is_hotfix }}
          CURRENT: ${{ steps.hotfix.outputs.current }}
        run: |
          BODY="$(cat <<EOF
          Bumps kiosk-screen images to \`${RAW_TAG}\` released via [kiosk-screen#${VERSION}](https://github.com/raimangsxr/kiosk-screen/releases/tag/${RAW_TAG}).

          Updated images:
          - \`rromani/kiosk-backend:${VERSION}\`
          - \`rromani/kiosk-frontend:${VERSION}\`

          $([ "$IS_HOTFIX" = "true" ] && echo "**Hotfix detected** (same major.minor as \`${CURRENT}\`) — this PR will be auto-approved and auto-merged." || echo "**Non-hotfix release** (previous: \`${CURRENT}\`) — manual review and merge required.")

          Triggered automatically by the \`Release Images\` workflow.
          EOF
          )"

          gh pr create \
            --repo raimangsxr/argocd-apps \
            --base main \
            --head "bump-kiosk-${VERSION}" \
            --title "chore: bump kiosk-screen to ${VERSION}" \
            --body "${BODY}" \
            --label "kiosk-screen"

      - name: Approve and merge PR (hotfix only)
        if: steps.hotfix.outputs.is_hotfix == 'true'
        env:
          GH_TOKEN: ${{ secrets.ARGOCD_APPS_TOKEN }}
        run: |
          set +e
          echo "Hotfix detected — attempting auto-approve + auto-merge"
          gh pr review --approve --repo raimangsxr/argocd-apps
          if [ $? -ne 0 ]; then
            echo "WARN: auto-approve failed (likely branch protection). Leaving PR for manual review."
            exit 0
          fi

          gh pr merge --squash --delete-branch --repo raimangsxr/argocd-apps
          if [ $? -ne 0 ]; then
            echo "WARN: auto-merge failed. PR remains open for manual action."
            exit 0
          fi

          echo "Hotfix PR merged successfully."

      - name: Notify non-hotfix PR
        if: steps.hotfix.outputs.is_hotfix != 'true'
        run: |
          echo "Non-hotfix release — PR left open for manual review and merge."