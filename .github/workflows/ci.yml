name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

env:
  BACKEND_IMAGE: kiosk-backend
  FRONTEND_IMAGE: kiosk-frontend

jobs:
  backend:
    name: Backend tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: kiosk
          POSTGRES_PASSWORD: kiosk
          POSTGRES_DB: kiosk_screen_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U kiosk -d kiosk_screen_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql+psycopg://kiosk:kiosk@localhost:5432/kiosk_screen_test
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/pyproject.toml

      - name: Install backend dependencies
        run: pip install -e "backend[dev]"

      - name: Run backend tests (in-memory DB)
        run: pytest backend/tests -m "not postgres"

      - name: Validate and apply database migrations
        run: |
          alembic -c backend/alembic.ini upgrade head
          alembic -c backend/alembic.ini current

      - name: Run Postgres-only tests (advisory locks, pg features)
        run: pytest backend/tests -m postgres -v

  frontend:
    name: Frontend tests and build
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm --prefix frontend ci

      - name: Run frontend tests
        run: npm --prefix frontend run test

      - name: Build frontend for production
        run: npm --prefix frontend run build

  docker:
    name: Docker build (no push)
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        uses: docker/build-push-action@v6
        with:
          context: backend
          push: false
          load: true
          tags: ${{ env.BACKEND_IMAGE }}:ci
          build-args: |
            PYTHON_VERSION=3.12-slim
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

      - name: Build frontend image
        uses: docker/build-push-action@v6
        with:
          context: frontend
          push: false
          load: true
          target: prod
          tags: ${{ env.FRONTEND_IMAGE }}:ci
          build-args: |
            BUILD_CONFIGURATION=production
            NODE_IMAGE=node:24-alpine
            NGINX_IMAGE=nginxinc/nginx-unprivileged:1.27-alpine
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend
