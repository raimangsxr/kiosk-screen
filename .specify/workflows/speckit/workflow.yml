schema_version: "1.0"
workflow:
  id: "speckit"
  name: "Token-Aware Full SDD Cycle"
  version: "2.0.0"
  author: "Kiosk Screen"
  description: "Runs specify -> clarify -> checklist -> plan -> tasks -> analyze -> implement with contract and context-pack gates"

requires:
  speckit_version: ">=0.8.11"
  integrations:
    any: ["opencode", "codex"]

inputs:
  spec:
    type: string
    required: true
    prompt: "Describe what you want to build"
  integration:
    type: string
    default: "opencode"
    prompt: "Integration to use (opencode or codex)"
  scope:
    type: string
    default: "full"
    enum: ["full", "backend-only", "frontend-only", "sdd-only"]

steps:
  - id: specify
    command: speckit.specify
    integration: "{{ inputs.integration }}"
    input:
      args: "{{ inputs.spec }}"

  - id: clarify
    command: speckit.clarify
    integration: "{{ inputs.integration }}"
    input:
      args: "{{ inputs.spec }}"

  - id: checklist
    command: speckit.checklist
    integration: "{{ inputs.integration }}"
    input:
      args: "{{ inputs.spec }}"

  - id: review-spec
    type: gate
    message: "Review spec.md, context-pack.md, manifest entry, and affected active contracts before planning."
    options: [approve, reject]
    on_reject: abort

  - id: plan
    command: speckit.plan
    integration: "{{ inputs.integration }}"
    input:
      args: "{{ inputs.spec }}"

  - id: review-plan
    type: gate
    message: "Review context grounding and constitution checks before task generation."
    options: [approve, reject]
    on_reject: abort

  - id: tasks
    command: speckit.tasks
    integration: "{{ inputs.integration }}"
    input:
      args: "{{ inputs.spec }}"

  - id: analyze
    command: speckit.analyze
    integration: "{{ inputs.integration }}"
    input:
      args: "{{ inputs.spec }}"

  - id: review-analysis
    type: gate
    message: "Resolve critical analysis findings before implementation."
    options: [approve, reject]
    on_reject: abort

  - id: implement
    command: speckit.implement
    integration: "{{ inputs.integration }}"
    input:
      args: "{{ inputs.spec }}"
