services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: kiosk_screen
      POSTGRES_USER: kiosk
      POSTGRES_PASSWORD: kiosk
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kiosk -d kiosk_screen"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:

